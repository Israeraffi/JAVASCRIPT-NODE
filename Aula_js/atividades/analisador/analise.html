<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script></script>
    <title>Analisador de Números</title>
  </head>
  <body>
    <h1>Analisador de Números</h1>
    <div id="bloco">
      <p id="p1">Número (entre 1 e 100)</p>
      <input type="number" id="inp1" placeholder="Insira o número" />
      <button id="but1" onclick="adicionar()">Adicionar</button>
      <select name="lista" id="lista" size="7"></select>
      <button id="but2" onclick="finalizar()">Finalizar</button>
      <div id="result"></div>
    </div>
    <footer>&copyAtividades</footer>
    <script src="script.js"></script>
  </body>

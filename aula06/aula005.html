<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Primeiros passos em DOM</title>
  </head>

  <style>
    body {
      background-color: rgb(0, 255, 221);
      color: white;
      font: normal 20pt Arial;
    }
  </style>

  <body>
    <h1>Iniciando Estudos em DOM</h1>
    <p>Aqui vai o resultado</p>
    <p class="parag">Aprendendo a usar o <strong>DOM</strong> em JavaScript.</p>
    <div id="msg">Clique em mim</div>

    <script>
      // pega pelo nome da Tag, mas tem que especificar.
      var p1 = document.getElementsByTagName("p")[0];

      // pega pelo Id
      var msg = document.getElementById("msg");

      // pega pela class, é preciso especificar, qual daquela class você quer
      var classe = document.getElementsByClassName("parag")[0];

      // usado para todos (class = '#parag', id = '.msg', Tag = 'p'), mas pega somente o primeiro
      var apenas_primeiro = document.querySelector("p");
        //document.write(apenas_primeiro.innerText);

      // usado para todos também (class = '.parag', id = '#msg', Tag = 'p'), mas possibilita especificar [0], [1]
      var para_todos = document.querySelectorAll("p")[1];
        //document.write(para_todos.innerText)
    </script>
  </body>
</html>

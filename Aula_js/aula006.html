<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evantos DOM</title>
  </head>
  <style>
    #area {
      background-color: green;
      color: aliceblue;
      font: normal 20pt Arial;
      width: 200px;
      height: 200px;
      line-height: 200px;
      text-align: center;
    }
  </style>
  <body>
    <div id="area">
      Interaja...
    </div>

    <script>
      let a = document.querySelector("#area");
      
      // Adiciona o evento sem ter que mexer no codigo html
      a.addEventListener('click', clicar);
      a.addEventListener('mouseenter', entrar);
      a.addEventListener('mouseout', sair)

      function clicar() {
        a.innerHTML = "Clicou!";
        a.style.backgroundColor = "red";
      }
      function entrar() {
        a.innerHTML = "Entrou!";
      }
      function sair() {
        a.innerHTML = "Saiu!";
        a.style.backgroundColor = 'green'
      }
    </script>
  </body>
</html>

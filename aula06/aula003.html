<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    body {
      font: normal 20px Arial;
      text-align: center;
    }
  </style>
  <body>
    <script>
      var nome = window.prompt("Digite seu nome: ");
      document.write(`Olá ${nome}, seu nome tem ${nome.length} letras <br>`);
      document.write(`Seu nome em maiúsculo é ${nome.toUpperCase()} <br>`);
      document.write(`Seu nome em minúsculo é ${nome.toLowerCase()} <br>`);
      
      // variavel.length -> conta os caracteres da String

      // variavel.toUpperCase() -> deixa tudo maiusculo

      // variavel.toLowerCase() -> deixa tudo minusculo

      // variavel.toFixed(n) -> decidir quantas casas decimais, transformar o número para String

      // variavel(em String).replace('oque quer tirar', 'oque quer colocar')

      // variavel.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'}) -> tranforma o valor para o padrão de volor de dinhiro no Brasil

      // OPERADORES ARITIMETICOS:

      // % usado para pedir o resto da dvisão inteira. Ex: 5 % 2 = 1

      // n ++ soma mais 1 a variavel e n -- subtrai 1 a variavel

      // OPERADORES RELACIONAIS:

      // == verifica se tem o mesmo valor, === verifica se tem o mesmo tipo e o mesmo valor

      // OPERADORES LOGICOS:

      // operadores logicos ! = negação -> true ou false, se não for true será false e virse versa.

      // && = e true e false, só é satisfeita se as duas forem verdadeira.

      // || = ou true ou false, basta uma das opções ser verdadeira que satisfaz.

      //  OPREADORES TERNÁRIO:

      // ternário ? e : -> teste ? true : false
    </script>
  </body>
</html>

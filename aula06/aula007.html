<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Somando números</title>
  </head>
  <style>
    body {
      font: normal 20pt Arial;
      background-color: aqua;
      text-align: center;
    }
    input {
      width: 50vw;
      display: block;
      margin-bottom: 20px;
      margin-left: auto;
      margin-right: auto;
      border-radius: 10px;
      padding: 5px 0 5px 10px;
    }
    button {
      width: 51vw;
      height: 5vw;
      background-color: rgb(188, 255, 88);
      border-radius: 10px;
    }
    #result {
      margin-top: 5vw;
    }
    
  </style>
  <body>
 
      <h1>Somando Valores</h1>
      <input
        type="number"
        name="txt1"
        id="txt1"
        placeholder="Digite um número..."
      />
      <input
        type="number"
        name="txt2"
        id="txt2"
        placeholder="Digite um número..."
      />
      <button onclick="somar()">Somar</button>
      <div id="result"></div>


    <script>
      function somar() {
        let txt1 = Number(document.querySelector("#txt1").value);
        let txt2 = Number(document.querySelector("#txt2").value);
        let soma = txt1 + txt2;
        let result = document.querySelector("#result");
        result.innerText = `A soma de ${txt1.toFixed(2).replace('.', ',')} + ${txt2.toFixed(2).replace('.', ',')} = ${soma.toFixed(2).replace(".", ",")}`;
      }
    </script>
  </body>
</html>
